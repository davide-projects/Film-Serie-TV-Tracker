<div>
  <h1 class="mb-4">{{ t()['yourStats'] }}</h1>

  @if (statsService.totalWatched() === 0) {
    <div class="alert alert-info">{{ t()['noWatched'] }}</div>
  } @else {
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card text-center shadow-sm h-100">
          <div class="card-body">
            <div class="display-6 fw-bold text-primary">{{ statsService.totalWatched() }}</div>
            <div class="text-muted mt-2">{{ t()['titlesWatched'] }}</div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-center shadow-sm h-100">
          <div class="card-body">
            <div class="display-6 fw-bold text-primary">{{ statsService.totalHours() | number }}</div>
            <div class="text-muted mt-2">{{ t()['totalHours'] }}</div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-center shadow-sm h-100">
          <div class="card-body">
            <div class="display-6 fw-bold text-primary">{{ statsService.favoriteGenre() }}</div>
            <div class="text-muted mt-2">{{ t()['favoriteGenre'] }}</div>
          </div>
        </div>
      </div>
    </div>
  }
</div>
