<div class="stats-page">
  <h1>Your Stats</h1>

  @if (statsService.totalWatched() === 0) {
    <p>You haven't marked any titles as watched yet.</p>
  } @else {
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-value">{{ statsService.totalWatched() }}</span>
        <span class="stat-label">Titles watched</span>
      </div>

      <div class="stat-card">
        <span class="stat-value">{{ statsService.totalHours() | number }}</span>
        <span class="stat-label">Total hours</span>
      </div>

      <div class="stat-card">
        <span class="stat-value">{{ statsService.favoriteGenre() }}</span>
        <span class="stat-label">Favorite genre</span>
      </div>
    </div>
  }
</div>
