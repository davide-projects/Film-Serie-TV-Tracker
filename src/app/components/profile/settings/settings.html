<section>
  <h1 class="mb-4">{{ t()['settings'] }}</h1>

  <article class="card shadow-sm">
    <div class="card-body">
      <div class="mb-4">
        <div class="form-check form-switch">
          <input
            class="form-check-input"
            type="checkbox"
            id="darkMode"
            [ngModel]="settingsService.darkMode()"
            (ngModelChange)="settingsService.toggleDarkMode($event)"
          />
          <label class="form-check-label" for="darkMode">{{ t()['darkMode'] }}</label>
        </div>
      </div>

      <div class="mb-3">
        <label for="language" class="form-label">{{ t()['language'] }}</label>
        <select
          class="form-select"
          id="language"
          [ngModel]="settingsService.language()"
          (ngModelChange)="settingsService.setLanguage($event)"
        >
          <option value="it">Italiano</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>
  </article>
</section>
